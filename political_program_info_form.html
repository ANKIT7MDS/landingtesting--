function _elIsPresignedUrl(u){
  try{
    const s = String(u||"");
    return /X-Amz-Algorithm=|X-Amz-Signature=|X-Amz-Credential=|X-Amz-Date=|X-Amz-SignedHeaders=/.test(s);
  }catch(e){ return false; }
}
function _elCacheBust(u){
  const url = String(u||"").trim();
  if(!url) return "";
  // Do NOT append query params to presigned URLs (signature will break)
  if(_elIsPresignedUrl(url)) return url;
  const sep = url.includes("?") ? "&" : "?";
  return url + sep + "t=" + Date.now();
}
function _elApplyBranding(cfg, formType){
  try{
    var forms=cfg.forms||{}, ft=forms[formType]||{}, def=cfg.defaults||cfg.branding||{}, gl=cfg.global||{};

    var foot=ft.footer_text||db.footer_text||def.footer_text||gl.tagline||'';
    // Lambda stores presigned URLs at ft.logo_url, ft.header_url, ft.background_url level

    var hdrUrl=ft.header_url||fb.header_url||(fb.header&&fb.header.url)||(db.header&&db.header.url)||def.header_url||'';
    var bgUrl=ft.background_url||fb.background_url||(fb.background&&fb.background.url)||(db.background&&db.background.url)||def.background_url||'';
    var bgOpa=((fb.bg_opacity!=null?fb.bg_opacity:db.bg_opacity!=null?db.bg_opacity:def.bg_opacity!=null?def.bg_opacity:35))/100;
    var c1=fb.color1||db.color1||def.color1||'';
    var c2=fb.color2||db.color2||def.color2||'';
    function s(id){ return document.getElementById(id); }
    // Text
    if(title){['org-name','org-title','brand-title'].forEach(function(id){var e=s(id);if(e)e.textContent=title;});}
    if(sub){['org-sub','org-subtitle','brand-subtitle'].forEach(function(id){var e=s(id);if(e)e.textContent=sub;});}
    if(tag){['org-tagline','brand-tagline'].forEach(function(id){var e=s(id);if(e){e.textContent=tag;e.style.display='';}});}
    if(foot){['footer-cam','footer-form','brand-footer'].forEach(function(id){var e=s(id);if(e)e.textContent=foot;});}
    // Colors
    if(c1){ document.documentElement.style.setProperty('--o1',c1); document.documentElement.style.setProperty('--c1',c1); }
    if(c2){ document.documentElement.style.setProperty('--o2',c2); document.documentElement.style.setProperty('--c2',c2); }
    // Logo - safe load
    if(logoUrl){
      var lu=_elCacheBust(logoUrl);
      ['logo-img','brand-logo','custom-logo'].forEach(function(id){
        var e=s(id); if(!e) return;
        e.onerror=function(){
          this.style.cssText='display:none!important';
          var di=s('default-icon'); if(di){di.style.cssText='display:flex!important';}
        };
        e.onload=function(){
          if(this.src&&this.src!==window.location.href&&!this.src.endsWith('/')){
            this.style.cssText='display:block!important;width:100%;height:100%;object-fit:contain;';
            this.classList.add('el-loaded'); this.classList.remove('hidden');
            var di=s('default-icon'); if(di) di.style.cssText='display:none!important';
          }
        };
        e.src=lu;
      });
      ['default-icon','logo-icon'].forEach(function(id){var e=s(id);if(e)e.style.display='none';});
    }
    // Header
    if(hdrUrl){
      ['hdr-cam-img','form-hdr-img','brand-header-img'].forEach(function(id){var e=s(id);if(e){
        e.onerror=function(){this.style.display='none';};
        e.onload=function(){if(this.src&&this.src!==window.location.href){this.style.display='block';}};
        e.src=_elCacheBust(hdrUrl);
      }});
      ['hdr-cam-img-wrap','form-hdr-img-wrap','brand-header-wrap'].forEach(function(id){var e=s(id);if(e)e.style.display='block';});
    
    // Also support DIV banner id="header-image"
    if(hdrUrl){
      var hd=s('header-image');
      if(hd){
        if(hd.tagName && hd.tagName.toLowerCase()==='img'){
          hd.onerror=function(){this.style.display='none';};
          hd.src=_elCacheBust(hdrUrl);
          hd.style.display='block';
        }else{
          hd.style.cssText='display:block!important;background-image:url("'+_elCacheBust(hdrUrl)+'");background-size:cover;background-position:center;width:100%;height:96px;border-radius:12px;margin-bottom:16px;';
          hd.classList.remove('hidden');
          hd.classList.add('el-visible');
        }
      }
    }
}
    // Background
    if(bgUrl){
      var img=new Image();
      img.onload=function(){
        document.body.style.backgroundImage='url("'+_elCacheBust(bgUrl)+'")';
        document.body.style.backgroundSize='cover';
        document.body.style.backgroundPosition='center';
        document.body.style.backgroundAttachment='fixed';
        var ov=s('_el_bg_ov');
        if(!ov){ov=document.createElement('div');ov.id='_el_bg_ov';ov.style.cssText='position:fixed;inset:0;z-index:0;pointer-events:none;';document.body.prepend(ov);}
        ov.style.background='rgba(15,23,42,'+(1-bgOpa)+')';
      };
      img.src=bgUrl;
    }
    // Programs
    var progs=ft.program_options||ft.programs||def.programs||[];
    if(progs.length){
      ['program_name','program_type','karyakram_name'].forEach(function(selId){
        var sel=s(selId);
        if(sel&&sel.querySelectorAll('option:not([value=""])').length<=1){
          progs.forEach(function(p){var o=document.createElement('option');o.value=p;o.textContent=p;sel.appendChild(o);});
        }
      });
    }
    // Level lock
    var fixedLevel=ft.fixed_level||'';
    if(fixedLevel){
      ['level','form_level'].forEach(function(selId){var sel=s(selId);if(sel){sel.value=fixedLevel;sel.disabled=true;}});
    }
  }catch(e){ console.warn('[EL Branding]',e); }
}

async function apiCall(action, payload) {
  const path = isPublicMode() ? "/political/public/forms" : "/political/forms";
  const url = BASE_URL + path;
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action, payload: payload || {} })
  });
  const text = await res.text();
  let data = {};
  try { data = JSON.parse(text); } catch(e) { data = { message: text || "Invalid JSON" }; }
  if (!res.ok) throw new Error(data.message || data.error || ("HTTP " + res.status));
  return data;
}

function safeStr(v) { return (v === null || v === undefined) ? "" : String(v); }

async function sha256Hex(file) {
  const buffer = await file.arrayBuffer();
  const hashBuffer = await crypto.subtle.digest("SHA-256", buffer);
  return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function uploadToS3(url, file) {
  await fetch(url, { method: "PUT", body: file, headers: { "Content-Type": file.type || "application/octet-stream" } });
}

function mergeObj(a, b) {
  const out = Object.assign({}, a || {});
  Object.keys(b || {}).forEach(k => {
    if (b[k] && typeof b[k] === "object" && !Array.isArray(b[k])) out[k] = mergeObj(out[k], b[k]);
    else out[k] = b[k];
  });
  return out;
}

async function loadRemoteConfig(formType) {
  // Returns { branding, programs, fixed_level } or null
  try {
    const payload = isPublicMode()
      ? { token, form_type: formType }
      : { collection_id: cidParam, form_type: formType };

    const action = isPublicMode() ? "public_get_config" : "admin_get_config";
    const res = await apiCall(action, payload);
    return res || null; // keep full response (settings/config/form)
  } catch (e) {
    if (debug) console.log("config load failed", e);
    return null;
  }
}

function applyBrandingFromConfig(cfg, formType, fallbackTitle, fallbackSubtitle, fallbackTagline, defaultIconId) {
  // Robust: supports legacy cfg.branding.* as well as new cfg.settings/defaults/forms shape
  const root = (cfg && (cfg.settings || cfg.config || cfg)) || {};
  const defaultsNode = (root.defaults || (root.settings && root.settings.defaults) || {}) || {};
  const formsNode = (root.forms || (root.settings && root.settings.forms) || {}) || {};

  const ftKey = formType || "";
  const ftAliasA = ftKey.replace(/_form$/, "");
  const ftAliasB = (typeof FORM_TYPE_ALIAS !== "undefined" && FORM_TYPE_ALIAS) ? FORM_TYPE_ALIAS : "";
  const perForm = (formsNode[ftKey] || formsNode[ftAliasB] || formsNode[ftAliasA] || {}) || {};

  // Legacy branding locations
  const legacyGlobal = (root.branding && root.branding.global) ? root.branding.global : {};
  const legacyPerForm = (root.branding && root.branding.forms && root.branding.forms[ftKey]) ? root.branding.forms[ftKey] : {};

  // Merge priority: defaults -> perForm -> legacyGlobal -> legacyPerForm (per-form wins)
  // Merge priority: defaults branding -> perForm branding -> legacyGlobal -> legacyPerForm
  // Supports new admin-console shape: defaults.branding.*, forms[ft].branding.*
  const defaultsBranding = (defaultsNode && defaultsNode.branding) ? defaultsNode.branding : defaultsNode;
  const perFormBranding = (perForm && perForm.branding) ? perForm.branding : perForm;
  const brand = mergeObj(mergeObj(mergeObj(defaultsBranding, perFormBranding), legacyGlobal), legacyPerForm);

  const title = perForm.title || brand.title || fallbackTitle || "EventLens Form";
  const subtitle = perForm.subtitle || brand.subtitle || fallbackSubtitle || "";
  const tagline = perForm.tagline || brand.tagline || fallbackTagline || "";

  const footerText = perForm.footer_text || brand.footer_text || "";

  // URLs: try common keys (lambda uses *_url; older uses *_image_url)
  const logoUrl = formNode.logo_url || brand.logo_url || (brand.logo && brand.logo.url) || "";
  const headerUrl = formNode.header_url || brand.header_url || brand.header_image_url || (brand.header && brand.header.url) || "";
  const bgUrl = formNode.background_url || brand.background_url || brand.background_image_url || (brand.background && brand.background.url) || "";
  // Also use headerUrl as headerImg alias for compatibility
  const headerImg = headerUrl;

  if ($("org-name")) $("org-name").textContent = title;
  if ($("org-subtitle")) $("org-subtitle").textContent = subtitle;
  if ($("org-tagline")) $("org-tagline").textContent = tagline;
  if ($("footer-text")) $("footer-text").textContent = footerText;

  // Theme
  setThemeVars(brand.color1 || brand.theme_primary, brand.color2 || brand.theme_secondary);
  setBackgroundImage(bgUrl);

  // Logo (preload to avoid ORB showing broken images)
  if (logoUrl && $("custom-logo")) {
    const img = new Image();
    img.onload = function() {
      $("custom-logo").src = logoUrl;
      $("custom-logo").classList.remove("hidden");
      if (defaultIconId && $(defaultIconId)) $(defaultIconId).classList.add("hidden");
    };
    img.onerror = function() {
      // keep default icon
    };
    img.src = logoUrl;
  }

  // Header image: support both <img> and div background
  const _applyHeaderImg = (url) => {
    if (!url) return;
    // Try header-image (div)
    const h = $("header-image");
    if (h) {
      const img = new Image();
      img.onload = function() {
        if (h.tagName && h.tagName.toLowerCase() === "img") {
          h.src = url;
        } else {
          h.style.backgroundImage = "url('" + url + "')";
          h.style.backgroundSize = "cover";
          h.style.backgroundPosition = "center";
        }
        h.classList.remove("hidden");
        h.style.display = "block";
      };
      img.onerror = function() { h.style.display = "none"; };
      img.src = url;
    }
    // Also try brand-header-img (img tag, like visitor form)
    const bhi = $("brand-header-img");
    if (bhi) {
      bhi.onerror = function() { this.style.display = "none"; };
      bhi.onload = function() {
        if (this.src && this.src !== window.location.href) {
          this.style.cssText = "display:block!important;position:absolute;inset:0;width:100%;height:100%;object-fit:cover;";
        }
      };
      bhi.src = url;
    }
  };
  if (headerUrl) _applyHeaderImg(headerUrl);
}

function fillProgramNames(cfg, selectId) {
  const sel = $(selectId);
  if (!sel) return;

  // Collect programs from multiple possible shapes (new + legacy)
  const formsNode = (cfg && (cfg.forms || (cfg.settings && cfg.settings.forms) || (cfg.config && cfg.config.forms))) || {};
  const defaultsNode = (cfg && (cfg.defaults || (cfg.settings && cfg.settings.defaults) || (cfg.config && cfg.config.defaults))) || {};
  const ftNode = (formsNode && (formsNode[FORM_TYPE] || formsNode[FORM_TYPE_ALIAS] || formsNode[FORM_TYPE.replace(/_form$/,'')] )) || {};

  const arrs = [];
  if (Array.isArray(ftNode.program_options)) arrs.push(ftNode.program_options);
  if (Array.isArray(ftNode.programs)) arrs.push(ftNode.programs);
  if (Array.isArray(defaultsNode.programs_common) && defaultsNode.programs_common.length) arrs.push(defaultsNode.programs_common);
  else if (Array.isArray(defaultsNode.programs)) arrs.push(defaultsNode.programs);
  if (Array.isArray(cfg.programs)) arrs.push(cfg.programs);

  const programs = Array.from(new Set(arrs.flat().map(s => safeStr(s).trim()).filter(Boolean)));

  sel.innerHTML = '<option value="">‚Äî ‡§ï‡§æ‡§∞‡•ç‡§Ø‡§ï‡•ç‡§∞‡§Æ ‡§ö‡•Å‡§®‡•á‡§Ç ‚Äî</option>';

  if (!programs.length) {
    const opt = document.createElement("option");
    opt.value = "";
    opt.textContent = "Admin ‡§Æ‡•á‡§Ç Program add ‡§ï‡§∞‡•á‡§Ç (‡§Ø‡§æ typing allowed)";
    sel.appendChild(opt);
    // allow manual typing fallback if present
    const manual = $("program_name_manual");
    if (manual) manual.classList.remove("hidden");
    return;
  }

  programs.forEach((v) => {
    const opt = document.createElement("option");

    opt.textContent = v;
    sel.appendChild(opt);
  });

  const manual = $("program_name_manual");
  if (manual) manual.classList.add("hidden");
}


function applyFixedProgram(cfg, selectId) {
  const sel = $(selectId);
  if (!sel) return;

  const formsNode = (cfg && (cfg.forms || (cfg.settings && cfg.settings.forms) || (cfg.config && cfg.config.forms))) || {};
  const ftNode = (formsNode && (formsNode[FORM_TYPE] || formsNode[FORM_TYPE_ALIAS] || formsNode[FORM_TYPE.replace(/_form$/,'')] )) || {};

  const fixedProgram = safeStr(ftNode.fixed_program || "").trim();
  const lock = (ftNode.fixed_program_lock === undefined) ? true : !!ftNode.fixed_program_lock;

  if (fixedProgram) {
    if (!Array.from(sel.options).some(o => (o.value||'') === fixedProgram)) {
      const opt = document.createElement("option");
      opt.value = fixedProgram;
      opt.textContent = fixedProgram;
      sel.appendChild(opt);
    }
    sel.value = fixedProgram;
    if (lock) sel.disabled = true;
  } else {
    sel.disabled = false;
  }
}

// LOCATION HELPERS (district -> vidhansabha -> mandal)
// ===============================
function initDistrictCascade() {
  const dEl = $("district");
  const vEl = $("vidhansabha");
  const mEl = $("mandal");
  if (!dEl || !vEl || !mEl) return;

  // Populate Districts
  dEl.innerHTML = '<option value="">‚Äî ‡§ú‡§ø‡§≤‡§æ ‡§ö‡•Å‡§®‡•á‡§Ç ‚Äî</option>';
  Object.keys(DISTRICT_DATA).sort((a,b)=>a.localeCompare(b,"hi")).forEach((d) => {
    const opt = document.createElement("option");
    opt.value = d;
    opt.textContent = d;
    dEl.appendChild(opt);
  });

  dEl.addEventListener("change", () => {
    const dVal = dEl.value;
    vEl.innerHTML = '<option value="">‚Äî ‡§µ‡§ø‡§ß‡§æ‡§®‡§∏‡§≠‡§æ ‡§ö‡•Å‡§®‡•á‡§Ç ‚Äî</option>';
    mEl.innerHTML = '<option value="">‚Äî ‡§™‡§π‡§≤‡•á ‡§µ‡§ø‡§ß‡§æ‡§®‡§∏‡§≠‡§æ ‡§ö‡•Å‡§®‡•á‡§Ç ‚Äî</option>';
    vEl.disabled = !dVal;
    mEl.disabled = true;

    if (dVal && DISTRICT_DATA[dVal]) {
      Object.keys(DISTRICT_DATA[dVal]).sort((a,b)=>a.localeCompare(b,"hi")).forEach((v) => {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v;
        vEl.appendChild(opt);
      });
    }
  });

  vEl.addEventListener("change", () => {
    const dVal = dEl.value;
    const vVal = vEl.value;
    mEl.innerHTML = '<option value="">‚Äî ‡§Æ‡§Ç‡§°‡§≤ ‡§ö‡•Å‡§®‡•á‡§Ç ‚Äî</option>';
    mEl.disabled = !vVal;

    if (dVal && vVal && DISTRICT_DATA[dVal] && DISTRICT_DATA[dVal][vVal]) {
      DISTRICT_DATA[dVal][vVal].slice().sort((a,b)=>a.localeCompare(b,"hi")).forEach((m) => {
        const opt = document.createElement("option");
        opt.value = m;
        opt.textContent = m;
        mEl.appendChild(opt);
      });
    }
  });
}

function applyLocationAutofill(info) {
  // info: {district, vidhansabha, mandal}
  if (!info) return;
  const d = safeStr(info.district).trim();
  const v = safeStr(info.vidhansabha).trim();
  const m = safeStr(info.mandal).trim();

  if (d && $("district")) {
    $("district").value = d;
    $("district").dispatchEvent(new Event("change"));
    setTimeout(() => {
      if (v && $("vidhansabha")) {
        $("vidhansabha").value = v;
        $("vidhansabha").dispatchEvent(new Event("change"));
        setTimeout(() => {
          if (m && $("mandal")) $("mandal").value = m;
        }, 120);
      }
    }, 120);
  }
}

const LEVELS = ["district","vidhansabha","mandal"];

function setLocationVisibility(level) {
  const dWrap = $("wrap-district");
  const vWrap = $("wrap-vidhansabha");
  const mWrap = $("wrap-mandal");
  if (!dWrap || !vWrap || !mWrap) return;
  // Always show all three dropdowns; we only disable based on selection.
  dWrap.classList.remove("hidden");
  vWrap.classList.remove("hidden");
  mWrap.classList.remove("hidden");
}

function initLevelControl(cfg, formType) {
  const levelEl = $("level");
  if (!levelEl) return;

  // decide fixed: url param > config fixed > none
  const fixedFromCfg = getFixedLevel(cfg, formType);
  const fixed = (LEVELS.includes(levelParam) ? levelParam : "") || (LEVELS.includes(fixedFromCfg) ? fixedFromCfg : "");

  if (fixed) {
    levelEl.value = fixed;
    levelEl.disabled = true;
    if ($("level-note")) $("level-note").textContent = "Level locked: " + fixed;
  } else {
    levelEl.disabled = false;
    if ($("level-note")) $("level-note").textContent = "Level: ‡§Ü‡§™ ‡§¨‡§¶‡§≤ ‡§∏‡§ï‡§§‡•á ‡§π‡•à‡§Ç";
  }

  setLocationVisibility(levelEl.value);

  levelEl.addEventListener("change", () => {
    setLocationVisibility(levelEl.value);
  });
}

// MULTI-PHOTO (optional)
// ===============================
let selectedFiles = [];

function refreshPhotoUI() {
  const grid = $("photo-grid");
  const hint = $("photo-hint");
  if (!grid) return;

  grid.innerHTML = "";
  if (!selectedFiles.length) {
    if (hint) hint.classList.remove("hidden");
    return;
  }
  if (hint) hint.classList.add("hidden");

  selectedFiles.forEach((f, idx) => {
    const url = URL.createObjectURL(f);
    const card = document.createElement("div");
    card.className = "relative overflow-hidden rounded-xl border border-white/10 bg-white/5";
    const img = document.createElement("img");
    img.src = url; img.className = "w-full h-24 object-cover"; img.alt = "photo-" + idx;
    const btn = document.createElement("button");
    btn.type = "button"; btn.className = "absolute top-2 right-2 bg-black/60 hover:bg-black/70 text-white rounded-full w-7 h-7 flex items-center justify-center border border-white/10";
    btn.innerHTML = '<i class="fa-solid fa-xmark text-xs"></i>';
    card.appendChild(img); card.appendChild(btn);
    btn.addEventListener("click", () => {
      selectedFiles.splice(idx, 1);
      refreshPhotoUI();
    });
    grid.appendChild(card);
  });
}

function onPhotosSelected(ev, maxFiles=10) {
  const files = Array.from((ev.target.files || []));
  if (!files.length) return;

  const next = selectedFiles.concat(files);
  selectedFiles = next.slice(0, maxFiles);
  $("photos").value = "";
  refreshPhotoUI();
}

    async function submitWithFiles(data) {
      // Photo upload removed - always submit without files
      const res = isPublicMode()
        ? await apiCall("public_create_entry", { token, form_type: FORM_TYPE, no_photo: true, payload: data })
        : await apiCall("create_entry", { collection_id: cidParam, form_type: FORM_TYPE, no_photo: true, payload: data });

      const finalizeAction = isPublicMode() ? "public_finalize_entry" : "finalize_entry";
      await apiCall(finalizeAction, { finalize_token: res.finalize_token, entry_id: res.entry_id });
      return;
    }

    $("f").addEventListener("submit", async (e) => {
      e.preventDefault();
        if (typeof __EL_PREVIEW_MODE !== "undefined" && __EL_PREVIEW_MODE) {
          try { showStatus("üîé Preview Mode: submit disabled", false); } catch(e) {}
          return;
        }

      const btn = $("submitBtn");
      const old = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
      showStatus("", false);

      try {
